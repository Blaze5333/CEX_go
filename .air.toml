root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/main.go"
bin = "./tmp/main"
include_ext = ["go", "toml", "env"]
exclude_dir = ["tmp", "vendor", "docker"]
delay = 1000
kill_delay = "0s"
rerun = false

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "red"
