services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cex}
      POSTGRES_DB: ${POSTGRES_DB:-cex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_initial_schema.up.sql:/docker-entrypoint-initdb.d/001_initial_schema.up.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cex} -d ${POSTGRES_DB:-cex}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URI: postgres://${POSTGRES_USER:-cex}:${POSTGRES_PASSWORD:-cex}@postgres:5432/${POSTGRES_DB:-cex}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      PORT: 8080
    ports:
      - "${PORT:-8080}:8080"

volumes:
  postgres_data:
  redis_data:
